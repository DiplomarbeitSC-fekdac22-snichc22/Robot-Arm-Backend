[coordinate_system]
name = "robot_base"
units = "mm"
origin = "J1 base rotation axis at the top"
x_positive = "toward the objects"
y_positive = "down"
z_positive = "right when looking toward the objects"

[aruco]
dictionary = "DICT_4X4_50"
shelf_marker_size_mm = 14.0

[markers."20"]
